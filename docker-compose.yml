services:
  auth-postgres:
    image: postgres:15-alpine
    container_name: course-db
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - course_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U course -d courseDB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  course_data: